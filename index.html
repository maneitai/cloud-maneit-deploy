<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maneit — Home</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%2064%2064%27%3E%3Crect%20width%3D%2764%27%20height%3D%2764%27%20rx%3D%2716%27%20fill%3D%27%23111827%27/%3E%3Cpath%20d%3D%27M16%2044V20h10l8%2014%208-14h10v24h-8V32l-7%2012h-6l-7-12v12z%27%20fill%3D%27%23d1d5db%27/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="page.css" />
</head>
<body>
<div class="page-shell">

  <header class="page-header">
    <div class="brand">
      <div class="brand-mark">M</div>
      <div class="header-copy">
        <div class="eyebrow">Maneit OS</div>
        <h1>Home</h1>
      </div>
    </div>
    <nav class="global-nav" aria-label="Primary">
      <a class="nav-link nav-link--active" href="./">Home</a>
      <a class="nav-link" href="./projects/">Projects</a>
      <a class="nav-link" href="./pipelines/">Pipelines</a>
      <a class="nav-link" href="./agent-factory/">Agent Factory</a>
      <a class="nav-link" href="./appcreator/">AppCreator</a>
      <a class="nav-link" href="./portalcreator/">PortalCreator</a>
      <a class="nav-link" href="./research-core/">Research Core</a>
      <a class="nav-link" href="./lorecore/">LoreCore</a>
      <a class="nav-link" href="./game-designer/">Game Designer</a>
      <a class="nav-link" href="./state/">State</a>
      <a class="nav-link" href="./settings/">Settings</a>
    </nav>
    <div class="header-actions">
      <span class="status-chip" id="globalStatusChip">Loading</span>
    </div>
  </header>

  <div class="home-layout">

    <!-- ── LEFT: history ── -->
    <aside class="panel panel-left">
      <div class="panel-head">
        <span class="eyebrow">Chats</span>
        <button class="btn-icon" id="newChatBtn" title="New chat">+</button>
      </div>
      <input class="input search-input" id="chatSearch" placeholder="Search..." autocomplete="off" />
      <div class="history-section">
        <div class="history-label">Pinned</div>
        <div class="history-list" id="pinnedChatsList"></div>
      </div>
      <div class="history-section">
        <div class="history-label">Projects</div>
        <div class="history-list" id="projectFolderList"></div>
      </div>
      <div class="history-section history-section--grow">
        <div class="history-label">Recent</div>
        <div class="history-list history-list--scroll" id="chatHistoryList"></div>
      </div>
    </aside>

    <!-- ── CENTER: chat ── -->
    <main class="panel panel-center">

      <!-- Mode + model bar -->
      <div class="chat-controls">
        <div class="mode-tabs">
          <button class="mode-tab mode-tab--active" data-mode="single">Single</button>
          <button class="mode-tab" data-mode="multi">Multi</button>
          <button class="mode-tab" data-mode="discussion">Discussion</button>
        </div>
        <div class="model-select-area" id="modelSelectArea">
          <select class="select select--compact" id="singleModel"><option>Loading...</option></select>
        </div>
        <div class="chat-header-actions">
          <button class="btn-sm" id="branchChatBtn">Branch</button>
          <button class="btn-sm btn-sm--accent" id="pinChatBtn">Pin</button>
        </div>
      </div>

      <!-- Thread -->
      <div class="chat-thread" id="chatThread">
        <div class="bubble bubble--assistant">
          <div class="bubble-head">Maneit</div>
          <p>Select a chat or start a new one.</p>
        </div>
      </div>

      <div class="resize-handle" id="chatResizeHandle"></div>

      <!-- Composer -->
      <div class="composer" id="composerArea">
        <div id="uploadPill"></div>
        <textarea class="composer-input" id="composerInput" placeholder="Ask anything. Shift+Enter for new line. Drop a file to analyse."></textarea>
        <div class="composer-bar">
          <span class="composer-status" id="composerStatus">Ready</span>
          <input type="file" id="fileUploadInput" style="display:none" />
          <button class="btn-icon" id="uploadBtn" title="Attach file">📎</button>
          <button class="btn-sm" id="intentBtn" data-intent="auto">Auto</button>
          <button class="btn-sm" id="stopBtn" style="display:none">Stop</button>
          <button class="btn-sm btn-sm--send" id="sendBtn">Send</button>
        </div>
      </div>

      <!-- Export — below composer -->
      <div class="export-panel">
        <div class="export-panel-head">
          <span class="eyebrow">Export to Projects</span>
        </div>
        <div class="export-row">
          <input class="input input--flex" id="exportTitle" placeholder="Project title..." />
          <div class="tag-group" id="projectTypeTags">
            <button class="tag tag--active" data-tag="App">App</button>
            <button class="tag" data-tag="Web">Web</button>
            <button class="tag" data-tag="Game">Game</button>
            <button class="tag" data-tag="Writing">Writing</button>
            <button class="tag" data-tag="Research">Research</button>
            <button class="tag" data-tag="System">System</button>
          </div>
          <button class="btn-sm btn-sm--accent" id="exportBtn">Export</button>
        </div>
        <textarea class="input input--note" id="exportNote" placeholder="What should Projects inherit from this chat?"></textarea>
      </div>

    </main>

    <!-- ── RIGHT: artifacts + todos ── -->
    <aside class="panel panel-right">
      <div class="right-tabs">
        <button class="right-tab right-tab--active" data-panel="todos">Todos</button>
        <button class="right-tab" data-panel="artifacts">Artifacts</button>
      </div>

      <div class="right-panel-content" id="rightPanelTodos">
        <div class="todo-list" id="todoList"></div>
        <div class="todo-add">
          <input class="input" id="todoInput" placeholder="Add todo..." />
          <button class="btn-sm btn-sm--accent" id="addTodoBtn">Add</button>
        </div>
      </div>

      <div class="right-panel-content" id="rightPanelArtifacts" style="display:none">
        <div class="artifacts-list" id="artifactsList">
          <div class="empty-state">No artifacts yet. Exports and pipeline outputs appear here.</div>
        </div>
      </div>
    </aside>

  </div>
</div>

<div id="toast" class="toast" role="status" aria-live="polite"></div>

<script>
(function(){
  try {
    const p=new URLSearchParams(window.location.search), b=p.get("apiBase");
    if(b){window.PM_API_BASE=b.replace(/\/+$/,"");localStorage.setItem("PM_API_BASE",window.PM_API_BASE);}
    else{const s=localStorage.getItem("PM_API_BASE");if(s)window.PM_API_BASE=s;}
  } catch{}
})();
</script>
<script src="page.js"></script>
</body>
</html>
